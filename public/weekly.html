<div class="weekly-toolbar">

  <div class="week-nav">
    <button id="prev-week" type="button">←</button>
    <button id="today-week" type="button">This Week</button>
    <button id="next-week" type="button">→</button>
  </div>

  <h2 id="week-title" style="margin:0;"></h2>

</div>

<div style="margin:10px 0; display:flex; gap:10px;">
  <button id="addLessonBtn" class="btn-primary">+ Add Lesson</button>
  <button id="addBlockBtn" class="btn-secondary">+ Block Time</button>
</div>

<div class="weekly-calendar">
  <div class="weekly-header" id="weekly-header"></div>

  <div class="weekly-body">
    <div class="time-col" id="time-col"></div>
    <div class="days-grid" id="days-grid"></div>
  </div>
</div>
