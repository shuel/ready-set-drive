<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Driving School App</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <nav class="app-nav">

    <div class="nav-brand">
      Ready Set Drive
    </div>

    <div class="nav-links">
      <button data-section="dashboard">Dashboard</button>
      <button data-section="students">Students</button>
      <button data-section="weekly">Calendar</button>
      <button data-section="accounts">Accounts</button>
      <button id="logoutBtn">Logout</button>
    </div>

  </nav>

  <div id="content"></div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/students.js"></script>
  <script src="/js/lessons.js"></script>
  <script src="/js/accounts.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/js/dashboard.js"></script>
  
  <!-- ================================= -->
  <!-- GLOBAL LESSON MODAL (SHARED) -->
  <!-- ================================= -->

  <div id="lessonModalOverlay" class="modal-overlay hidden">
    <div class="modal">

      <div class="modal-header">
        <h3 id="lessonModalTitle">Lesson</h3>
        <button id="lessonModalClose" type="button">✕</button>
      </div>

      <!-- LESSON FIELDS -->
      <div id="lessonFields">

        <!-- Student selector (hidden when not needed) -->
        <div id="studentSelectWrap">
          <!--label>Student</label-->
          <input id="lessonStudentSearch" class="form-input" placeholder="Search student...">
          <div id="lessonStudentResults" class="student-search-results"></div>
        </div>

        <label>Date</label>
        <input id="editLessonDate" type="date" class="form-input"/>

        <label>Start</label>
        <input id="editStartTime" type="time" class="form-input"/>

        <label>End</label>
        <input id="editEndTime" type="time" class="form-input"/>

        <div class="form-row">

          <div>
            <label>Type</label>
            <select id="editLessonType" class="form-input">
              <option value="Lesson">Lesson</option>
              <option value="Test">Test</option>
            </select>
          </div>

          <div>
            <label>Paid</label>
            <select id="editLessonPaid" class="form-input">
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>

          <div>
            <label>Price (£)</label>
            <div id="editLessonPrice" class="form-display"></div>
          </div>

        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="sendWhatsApp">
          Send WhatsApp confirmation
        </label>

      </div>

      <!-- BLOCK FIELDS -->
      <div id="blockFields" style="display:none;"></div>

      <div style="margin-top:15px; text-align:right;">
        <button id="saveLessonBtn" class="btn-primary">Save</button>
        <button id="deleteLessonBtn" class="btn-danger">Delete</button>
      </div>

    </div>
  </div>

</body>
</html>
