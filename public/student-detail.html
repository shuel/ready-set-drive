<div id="student-detail">

  <button id="back-to-students" class="back-btn">← Back to Students</button>

  <!-- Student Header -->
  <div class="student-profile-header">
    <h2 id="student-name"></h2>
  </div>

  <!-- TOP DASHBOARD SECTION -->
  <div class="student-top-grid">

    <!-- Test Readiness -->
    <div class="dashboard-card student-status-card">

      <div class="dash-top">
        <div class="dash-label">Test Readiness</div>
      </div>

      <div class="status-row">
        <div>Status</div>
        <strong id="testStatus">In Progress</strong>
      </div>

      <div class="status-row">
        <div>Instructor Rating</div>
        <select id="studentRating" class="form-input">
          <option value="1">1 - Beginner</option>
          <option value="2">2 - Improving</option>
          <option value="3">3 - Nearly Ready</option>
          <option value="4">4 - Test Ready</option>
        </select>
      </div>

    </div>

    <!-- Finance -->
    <div class="dashboard-card student-finance-card">

      <div class="dash-top">
        <div class="dash-label">Student Finance</div>
      </div>

      <div class="finance-row">
        <div>Total Lesson Value</div>
        <strong id="student-total">£0</strong>
      </div>

      <div class="finance-row">
        <div>Paid</div>
        <strong id="student-paid">£0</strong>
      </div>

      <div class="finance-row">
        <div>Outstanding</div>
        <strong id="student-outstanding">£0</strong>
      </div>

    </div>

    <!-- Progress -->
    <div class="dashboard-card student-progress-card">

      <div class="dash-top">
        <div class="dash-label">Student Progress</div>
      </div>

      <div class="progress-row">
        <div>Lessons Completed</div>
        <strong id="progressLessons">0</strong>
      </div>

      <div class="progress-row">
        <div>Hours Driven</div>
        <strong id="progressHours">0</strong>
      </div>

    </div>

    <!-- Instructor Notes -->
    <div class="dashboard-card notes-card">

      <div class="dash-top">
        <div class="dash-label">Instructor Notes</div>
      </div>

      <textarea id="student-notes" placeholder="Add notes about student's progress..."></textarea>

      <button id="save-notes" class="btn-primary">Save Notes</button>

    </div>

  </div>

  <!-- LESSON HISTORY SECTION -->

  <div class="section-header">
    <h3>Lesson History</h3>
  </div>

  <div class="lesson-filters">
    <button id="filter-all">All</button>
    <button id="filter-unpaid">Unpaid</button>
    <button id="filter-paid">Paid</button>
  </div>

  <div id="student-lessons">
    Loading Lessons......
  </div>

  <!-- ================================= -->
  <!-- Lesson Modal (reused from weekly) -->
  <!-- ================================= -->

  <div id="lessonModalOverlay" class="modal-overlay hidden">
    <div class="modal">

      <div class="modal-header">
        <h3 id="lessonModalTitle">Lesson</h3>
        <button id="lessonModalClose" type="button">✕</button>
      </div>

      <!-- LESSON FIELDS -->
      <div id="lessonFields">

        <label>Date</label>
        <input id="editLessonDate" type="date" class="form-input"/>

        <label>Start</label>
        <input id="editStartTime" type="time" class="form-input"/>

        <label>End</label>
        <input id="editEndTime" type="time" class="form-input"/>

        <div class="form-row">

          <div>
            <label>Type</label>
            <select id="editLessonType" class="form-input">
              <option value="Lesson">Lesson</option>
              <option value="Test">Test</option>
            </select>
          </div>

          <div>
            <label>Paid</label>
            <select id="editLessonPaid" class="form-input">
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>

          <div>
            <label>Price (£)</label>
            <div id="editLessonPrice" class="form-display"></div>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" id="sendWhatsApp">
            Send WhatsApp confirmation
          </label>

        </div>

      </div>

      <!-- BLOCK FIELDS -->
      <div id="blockFields" style="display:none;"></div>

      <div style="margin-top:15px; text-align:right;">
        <button id="saveLessonBtn" class="btn-primary">Save</button>
        <button id="deleteLessonBtn" class="btn-danger">Delete</button>
      </div>

    </div>
  </div>

</div>
