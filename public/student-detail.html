<div id="student-detail">

  <button id="back-to-students">← Back to Students</button>

  <!-- Student header -->
  <div class="student-profile-header">
    <h2 id="student-name"></h2>
  </div>

  <!-- Finance summary card -->
  <div class="dashboard-card student-finance-card">

    <div class="dash-top">
      <div class="dash-label">Student Finance</div>
    </div>

    <div class="finance-row">
      <div>Total Lesson Value</div>
      <strong id="student-total">£0</strong>
    </div>

    <div class="finance-row">
      <div>Paid</div>
      <strong id="student-paid">£0</strong>
    </div>

    <div class="finance-row">
      <div>Outstanding</div>
      <strong id="student-outstanding">£0</strong>
    </div>

  </div>

  <h3>Lesson History</h3>
  <div class="lesson-filters">
    <button id="filter-all">All</button>
    <button id="filter-unpaid">Unpaid</button>
    <button id="filter-paid">Paid</button>
  </div>
  <div id="student-lessons">
    Loading Lessons......
  </div>

</div>
