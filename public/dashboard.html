<div class="container">

  <h1>Dashboard</h1>

    <div class="dashboard-grid">

        <div class="dashboard-card">
            <div class="dash-top">
                <div class="dash-label">Today's Lessons</div>
                <i data-lucide="calendar"></i>
            </div>

            <div class="dash-value" id="dash-today-count">0</div>

            <!-- TODAY LIST INSIDE CARD -->
            <div id="today-list" class="today-list">
                <!-- JS renders here -->
            </div>
        </div>

        <div class="dashboard-card">
            <div class="dash-top upnext-header">
                <div class="upnext-title-row">
                    <span class="dash-label">Up Next</span>

                    <div class="upnext-controls">
                        <span class="upnext-showing-label">Showing</span>
                        <select id="upnext-limit">
                        <option value="3" selected>3</option>
                        <option value="5">5</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                        </select>
                    </div>
                </div>

                <i data-lucide="clock"></i>
            </div>

            <div id="upcoming-list" class="today-list"></div>
        </div>

        <div class="dashboard-card">
            <div class="dash-top">
            <div class="dash-label">This Week</div>
            <i data-lucide="calendar-days"></i>
            </div>
            <div class="dash-value" id="dash-week">0</div>
        </div>

        <div class="dashboard-card">
            <div class="dash-top">
            <div class="dash-label">Active Students</div>
            <i data-lucide="users"></i>
            </div>
            <div class="dash-value" id="dash-students">0</div>
        </div>

        <div class="dashboard-card">
            <div class="dash-top">
            <div class="dash-label">Weekly Revenue</div>
            <i data-lucide="pound-sterling"></i>
            </div>
            <div class="dash-value" id="dash-revenue">£0</div>
        </div>

        <div class="dashboard-card">
            <div class="dash-top">
                <div class="dash-label">Outstanding Revenue</div>
                <i data-lucide="alert-circle"></i>
            </div>
            <div class="dash-value" id="dash-outstanding">£0</div>
        </div>

    </div>

</div>
