<div class="container">

  <h1>Dashboard</h1>

    <div class="dashboard-grid">

        <div class="dashboard-card">
            <div class="dash-top">
            <div class="dash-label">
                Today's Lessons: <b><span id="dash-today">0</span></b>
            </div>
            <i data-lucide="calendar"></i>
            </div>
            <div class="dash-value" id="dash-today">0</div>
        </div>

        <div class="dashboard-card">
            <div class="dash-top">
            <div class="dash-label">This Week</div>
            <i data-lucide="calendar-days"></i>
            </div>
            <div class="dash-value" id="dash-week">0</div>
        </div>

        <div class="dashboard-card">
            <div class="dash-top">
            <div class="dash-label">Active Students</div>
            <i data-lucide="users"></i>
            </div>
            <div class="dash-value" id="dash-students">0</div>
        </div>

        <div class="dashboard-card">
            <div class="dash-top">
            <div class="dash-label">Weekly Revenue</div>
            <i data-lucide="pound-sterling"></i>
            </div>
            <div class="dash-value" id="dash-revenue">£0</div>
        </div>

        <div class="dashboard-card">
            <div class="dash-top">
                <div class="dash-label">Outstanding Revenue</div>
                <i data-lucide="alert-circle"></i>
            </div>
            <div class="dash-value" id="dash-outstanding">£0</div>
        </div>

    </div>

</div>
